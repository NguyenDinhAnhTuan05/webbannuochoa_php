services:
  # ── PHP App (Apache) ─────────────────────────────────────────────────
  app:
    build: .
    container_name: webbannuochoa_app
    # Không expose port 80 trực tiếp ra ngoài nữa - để Nginx xử lý
    expose:
      - "80"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-ndat0011}
      - DB_NAME=${DB_NAME:-webbanhang}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - db
    restart: unless-stopped

  # ── MySQL Database ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: webbannuochoa_db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-ndat0011}
      - MYSQL_DATABASE=${DB_NAME:-webbanhang}
    volumes:
      # Ánh xạ thư mục sql vào initdb để tự động tạo bảng dữ liệu lần chạy đầu tiên
      - ./sql/webbanhang.sql:/docker-entrypoint-initdb.d/init.sql
      # Lưu data để database không mất khi stop/xóa container
      - db_data:/var/lib/mysql
    restart: unless-stopped

  # ── Nginx Reverse Proxy + SSL (Let's Encrypt) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: webbannuochoa_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # ── Certbot (tự động gia hạn SSL) ───────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: webbannuochoa_certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  db_data:
