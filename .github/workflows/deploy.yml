name: 🚀 CI/CD - Deploy to Production Server

on:
  push:
    branches:
      - main # Tự động deploy khi push lên nhánh main
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # Bước 1: Checkout code (Github Actions cần đọc file repo)
      # ─────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # Bước 2: SSH vào server và chạy toàn bộ quy trình deploy
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔐 SSH & Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}        # IP server, ví dụ: 36.50.135.61
          username: ${{ secrets.SERVER_USERNAME }} # User SSH, ví dụ: root hoặc ubuntu
          password: ${{ secrets.SERVER_PASSWORD }} # Password SSH của server
          port: ${{ secrets.SERVER_PORT }}         # Cổng SSH, thường là 22
          command_timeout: 20m                     # Tăng timeout khi build image lâu
          script: |
            set -e
            echo "============================================"
            echo "🚀 Bắt đầu triển khai: $(date)"
            echo "============================================"

            DEPLOY_DIR="/var/www/webbannuochoa"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            # ── A: Clone hoặc Pull code ────────────────────────────────────
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "📂 [LẦN ĐẦU] Chưa có project → Đang clone..."
              mkdir -p "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            else
              echo "🔄 Project đã tồn tại → Đang pull bản mới nhất..."
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"

            # ── B: Tạo file .env từ GitHub Secrets ────────────────────────
            # Dùng printf để tránh lỗi thụt dòng của heredoc
            echo "📝 Ghi file .env..."
            printf "DB_HOST=db\n" > .env
            printf "DB_USER=${{ secrets.DB_USER }}\n" >> .env
            printf "DB_PASS=${{ secrets.DB_PASS }}\n" >> .env
            printf "DB_NAME=${{ secrets.DB_NAME }}\n" >> .env
            printf "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}\n" >> .env
            echo "✅ File .env đã được tạo"

            # ── C: Kiểm tra Docker và chọn lệnh compose ───────────────────
            if ! command -v docker &> /dev/null; then
              echo "❌ Docker chưa cài đặt trên server! Chạy script setup_server.sh trước."
              exit 1
            fi

            if command -v docker-compose &> /dev/null; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi
            echo "🐳 Dùng lệnh: $COMPOSE_CMD"

            # ── D: Dừng container cũ + XÓA VOLUME DB để init.sql chạy lại ──
            echo "🔄 Dừng container cũ và xóa volume database..."
            $COMPOSE_CMD down -v --remove-orphans || true
            # Giải thích: -v xóa volume db_data, buộc MySQL chạy lại init.sql
            # Dữ liệu sẽ bị reset - phù hợp cho môi trường production mới

            # ── D+: Giải phóng port 80 nếu bị chiếm bởi Apache/Nginx ──────
            echo "🔍 Kiểm tra port 80..."
            if ss -tlnp | grep -q ':80 '; then
              echo "⚠️  Port 80 đang bị chiếm! Đang tắt web server..."
              systemctl stop apache2 2>/dev/null && echo "  → Đã tắt Apache2" || true
              systemctl stop nginx   2>/dev/null && echo "  → Đã tắt Nginx"   || true
              systemctl disable apache2 2>/dev/null || true
              systemctl disable nginx   2>/dev/null || true
              fuser -k 80/tcp 2>/dev/null || true
              sleep 2
              echo "✅ Port 80 đã được giải phóng"
            else
              echo "✅ Port 80 đang trống, sẵn sàng dùng"
            fi

            echo "🔨 Build Docker image (--no-cache)..."
            $COMPOSE_CMD build --no-cache

            echo "▶️  Khởi động container..."
            $COMPOSE_CMD up -d

            # ── E: Chờ MySQL thật sự ready (không chỉ chờ theo thời gian) ──
            echo "⏳ Chờ MySQL sẵn sàng (tối đa 90 giây)..."
            MAX_WAIT=90
            COUNT=0
            until $COMPOSE_CMD exec -T db mysqladmin ping -h "localhost" --silent 2>/dev/null; do
              COUNT=$((COUNT + 1))
              if [ $COUNT -ge $MAX_WAIT ]; then
                echo "❌ MySQL không khởi động được sau ${MAX_WAIT}s! Log lỗi:"
                $COMPOSE_CMD logs --tail=30 db
                exit 1
              fi
              echo "  [${COUNT}s] MySQL chưa sẵn sàng, đợi thêm..."
              sleep 1
            done
            echo "✅ MySQL đã sẵn sàng sau ${COUNT}s!"

            echo "📊 Trạng thái container:"
            $COMPOSE_CMD ps

            APP_STATUS=$($COMPOSE_CMD ps -q app | xargs docker inspect --format='{{.State.Status}}' 2>/dev/null || echo "unknown")
            if [ "$APP_STATUS" != "running" ]; then
              echo "❌ Container 'app' không chạy được! Log lỗi:"
              $COMPOSE_CMD logs --tail=50 app
              exit 1
            fi

            echo "============================================"
            echo "✅ Triển khai THÀNH CÔNG: $(date)"
            echo "🌐 Website: http://${{ secrets.SERVER_HOST }}"
            echo "============================================"

