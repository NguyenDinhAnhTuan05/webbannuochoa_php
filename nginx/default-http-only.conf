# Cấu hình Nginx CHỈ HTTP - dùng khi chưa có SSL Certificate
# Sau khi chạy init_ssl.sh thành công, Nginx sẽ tự load lại với HTTPS

server {
    listen 80;
    server_name hocvien.online www.hocvien.online;

    # Cho Certbot xác thực domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tạm thời phục vụ HTTP trong khi chờ SSL
    location / {
        proxy_pass         http://app:80;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }
}
