server {
    listen 80;
    server_name hocvien.online www.hocvien.online;

    # Dùng để Certbot xác thực domain (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tất cả traffic HTTP → redirect HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hocvien.online www.hocvien.online;

    # SSL Certificate từ Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/hocvien.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hocvien.online/privkey.pem;

    # Cấu hình SSL an toàn
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Forward request đến PHP App container
    location / {
        proxy_pass         http://app:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # Upload file tối đa 50MB (cho ảnh sản phẩm)
    client_max_body_size 50M;
}
